---
version: '3'

vars:
  CC: /opt/homebrew/opt/llvm/bin/clang -I/usr/local/include # for apple clang
  CC_FLAGS: "-Werror -Wextra -Wall -Wfree-nonheap-object -std=c17"
  TEST_EXECUTABLE_NAME: test
  SOURCE_FILES:
    - item.c
    - list.c
    - hashmap.c
  DYN_LIBS_USED_PATH: -L/usr/local/lib/standardloop
  DYN_LIBS_USED: "-lstandardloop-util"
  DYLIB_NAME: libstandardloop-collections.dylib
  DYLIB_PATH: /usr/local/lib/standardloop/
  DYLIB_INCLUDE_PATH: /usr/local/include/standardloop/
  RELEASE_VERSION: 0.0.0

# Inputs
# - REPO_NAME
# - DYLIB_VERSION
# - DYLIB_NAME
download-dependency: &download-dependency |
  mkdir -p dependencies/tmp-{{.DYLIB_NAME}}
  cd dependencies/tmp-{{.DYLIB_NAME}}
  curl -O -J -L https://github.com/standardloop/{{.REPO_NAME}}/releases/download/v{{.DYLIB_VERSION}}/libstandardloop-{{.DYLIB_NAME}}.zip
  unzip libstandardloop-{{.DYLIB_NAME}}.zip
  sudo mkdir -p /usr/local/lib/standardloop/
  sudo mkdir -p /usr/local/include/standardloop/
  sudo mv libstandardloop-{{.DYLIB_NAME}}.dylib /usr/local/lib/standardloop/
  sudo mv {{.DYLIB_NAME}}.h /usr/local/include/standardloop/ && rm libstandardloop-{{.DYLIB_NAME}}.zip

tasks:
  default:
    silent: true
    cmds:
      - task: test
      - task: test:sanitize
  
  clean:
    cmds:
      - rm -f {{.TEST_EXECUTABLE_NAME}}
      - rm -f {{.TEST_EXECUTABLE_NAME}}-sanitize

  check-version:
    silent: true
    cmds:
      - cat collections.h | grep -q {{.RELEASE_VERSION}}
      - cat collections.h | grep -q "MAJOR_VERSION 0"
      - cat collections.h | grep -q "MINOR_VERSION 0"
      - cat collections.h | grep -q "PATCH_VERSION 0"

  dependencies:
    deps:
      - dependencies:util

  dependencies:util:
    vars:
      REPO_NAME: c-util
      DYLIB_VERSION: 0.0.7
      DYLIB_NAME: util
    cmds:
      - sudo -v
      - *download-dependency
    status:
      - otool -L /usr/local/lib/standardloop/libstandardloop-{{.DYLIB_NAME}}.dylib | head -n 2 | tail -n 1 | grep "current version {{.DYLIB_VERSION}}"
      - cat /usr/local/include/standardloop/{{.DYLIB_NAME}}.h | grep "STANDARDLOOP_{{.DYLIB_NAME | upper}}_H_VERSION \"{{.DYLIB_VERSION}}\""

  release:
    deps:
      - check-version
      - release:build
      - release:move-files

  release:build:
    run: once
    deps:
      - check-version
      - dependencies
    cmds:
      - |
        clang {{.CC_FLAGS}} \
        {{range .SOURCE_FILES}} {{.}} {{end}} \
        {{.DYN_LIBS_USED_PATH}} \
        {{.DYN_LIBS_USED}} \
        -O3 \
        -dynamiclib \
        -current_version {{.RELEASE_VERSION}} \
        -compatibility_version {{.RELEASE_VERSION}} \
        -o {{.DYLIB_NAME}}
    sources:
      - "*.c"
    generates:
      - "{{.DYLIB_NAME}}"
  
  release:move-files:
    deps:
      - release:build
    cmds:
      - sudo -v
      - sudo cp {{.DYLIB_NAME}} {{.DYLIB_PATH}}
      - sudo cp collections.h {{.DYLIB_INCLUDE_PATH}}

  release:clean:
    allow_failure: true
    cmds:
      - sudo -v
      - sudo rm -f {{.DYLIB_PATH}}/{{.DYLIB_NAME}}
      - sudo rm -f {{.DYLIB_INCLUDE_PATH}}/collections.h
    
  # local test
  remote:download:
    run: once
    cmds:
      - |
        mkdir -p tmp
        cd tmp
        curl -O -J -L https://github.com/standardloop/c-collections/releases/download/v{{.RELEASE_VERSION}}/libstandardloop-collections.zip
        unzip libstandardloop-collections.zip
        rm libstandardloop-collections.zip

  remote:move:
    deps:
      - remote:download
    cmds:
      - |
        cd tmp/
        sudo -v
        sudo mv {{.DYLIB_NAME}} {{.DYLIB_PATH}}
        sudo mv collections.h {{.DYLIB_INCLUDE_PATH}}

  test:
    deps:
      - test:build
      #- test:build-sanitize

  test:build:
    run: once
    cmds:
      - |
        {{.CC}} {{.CC_FLAGS}} \
        test.c \
        {{range .SOURCE_FILES}} {{.}} {{end}} \
        {{.DYN_LIBS_USED_PATH}} \
        {{.DYN_LIBS_USED}} \
        -O0 \
        # -lstandardloop-collections \
        -o {{.TEST_EXECUTABLE_NAME}}
    sources:
      - "*.c"
    generates:
      - "{{.TEST_EXECUTABLE_NAME}}"
  
  test:sanitize:
    deps:
      - test:build-sanitize

  test:build-sanitize:
    run: once
    cmds:
      - |
        {{.CC}} {{.CC_FLAGS}} \
        test.c \
        {{range .SOURCE_FILES}} {{.}} {{end}} \
        {{.DYN_LIBS_USED_PATH}} \
        {{.DYN_LIBS_USED}} \
        -O0 \
        # -lstandardloop-collections \
        -fno-omit-frame-pointer \
        -fsanitize=address \
        -o {{.TEST_EXECUTABLE_NAME}}-sanitize
    sources:
      - "*.c"
    generates:
      - "{{.TEST_EXECUTABLE_NAME}}-sanitize"

  leaks:
    cmds:
    - task: test:leaks

  test:leaks:
    deps:
      - test:build
    cmds:
      - cp /usr/local/lib/standardloop/libstandardloop-util.dylib ./ # to get around sips we need to move dylibs to local dir :(
      - leaks --atExit -- ./{{.TEST_EXECUTABLE_NAME}}
      - rm libstandardloop-util.dylib
